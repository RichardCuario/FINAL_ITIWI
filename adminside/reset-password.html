<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - iTIWI Admin</title>
  <link rel="icon" type="image/png" href="assets/itiwi_logo.png" />
  <link rel="shortcut icon" type="image/png" href="assets/itiwi_logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .reset-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 420px;
      width: 100%;
      padding: 50px 40px;
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .reset-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .reset-logo {
      height: 60px;
      margin-bottom: 20px;
    }

    .reset-logo img {
      height: 100%;
      width: auto;
    }

    .reset-title {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .reset-subtitle {
      font-size: 14px;
      color: #666;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: #667eea;
      background-color: #f9f9ff;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .password-toggle {
      position: relative;
    }

    .password-toggle-btn {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #667eea;
      cursor: pointer;
      font-size: 16px;
    }

    .password-strength {
      margin-top: 8px;
      font-size: 12px;
      display: flex;
      gap: 4px;
    }

    .strength-bar {
      height: 4px;
      flex: 1;
      background: #e0e0e0;
      border-radius: 2px;
      overflow: hidden;
    }

    .strength-bar.weak {
      background: #ff6b6b;
    }

    .strength-bar.fair {
      background: #ffd93d;
    }

    .strength-bar.good {
      background: #6bcf7f;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 15px;
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error-message {
      background-color: #fee;
      color: #c33;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
      display: none;
      border-left: 4px solid #c33;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      background-color: #efe;
      color: #3c3;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
      display: none;
      border-left: 4px solid #3c3;
    }

    .success-message.show {
      display: block;
    }

    .loader {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading .loader {
      display: block;
    }

    .reset-footer {
      text-align: center;
      font-size: 14px;
      color: #666;
    }

    .reset-footer a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }

    .reset-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="reset-container">
    <div class="reset-header">
      <div class="reset-logo">
        <img src="assets/ITIWI-LOGO.png" alt="iTIWI Logo" />
      </div>
      <h1 class="reset-title">Reset Password</h1>
      <p class="reset-subtitle">Create a new password for your account</p>
    </div>

    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>

    <form id="resetForm">
      <div class="form-group">
        <label class="form-label">New Password</label>
        <div class="password-toggle">
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="Enter new password"
            required
            minlength="8"
          />
          <button type="button" class="password-toggle-btn" id="togglePassword">
            <i class="fa-solid fa-eye"></i>
          </button>
        </div>
        <div class="password-strength" id="passwordStrength">
          <div class="strength-bar"></div>
          <div class="strength-bar"></div>
          <div class="strength-bar"></div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <div class="password-toggle">
          <input
            type="password"
            id="confirmPassword"
            class="form-input"
            placeholder="Confirm password"
            required
          />
          <button type="button" class="password-toggle-btn" id="toggleConfirmPassword">
            <i class="fa-solid fa-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">
        <span>Reset Password</span>
        <div class="loader"></div>
      </button>
    </form>

    <div class="reset-footer">
      <a href="./login.html">Back to Login</a>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://jbhlbukxankrtcwhqoll.supabase.co';
    const SUPABASE_ANON_KEY =
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpiaGxidWt4YW5rcnRjd2hxb2xsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NzAxODgsImV4cCI6MjA5MDA0NjE4OH0.DebtVdw7bF5nRaXQg8Ta2SsO2Qv42QnGSzoS8hT2vJc';

    let supabaseClient = null;

    function initSupabase() {
      if (typeof window.supabase !== 'undefined' && typeof window.supabase.createClient === 'function') {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      }
    }

    const resetForm = document.getElementById('resetForm');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const togglePasswordBtn = document.getElementById('togglePassword');
    const toggleConfirmPasswordBtn = document.getElementById('toggleConfirmPassword');
    const submitBtn = document.getElementById('submitBtn');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');
    const passwordStrength = document.getElementById('passwordStrength');

    window.addEventListener('load', initSupabase);

    togglePasswordBtn.addEventListener('click', (e) => {
      e.preventDefault();
      const type = passwordInput.type === 'password' ? 'text' : 'password';
      passwordInput.type = type;
      togglePasswordBtn.innerHTML = type === 'password' ? '<i class="fa-solid fa-eye"></i>' : '<i class="fa-solid fa-eye-slash"></i>';
    });

    toggleConfirmPasswordBtn.addEventListener('click', (e) => {
      e.preventDefault();
      const type = confirmPasswordInput.type === 'password' ? 'text' : 'password';
      confirmPasswordInput.type = type;
      toggleConfirmPasswordBtn.innerHTML = type === 'password' ? '<i class="fa-solid fa-eye"></i>' : '<i class="fa-solid fa-eye-slash"></i>';
    });

    passwordInput.addEventListener('input', () => {
      const strength = getPasswordStrength(passwordInput.value);
      updateStrengthUI(strength);
    });

    function getPasswordStrength(password) {
      let strength = 0;
      if (password.length >= 8) strength++;
      if (password.length >= 12) strength++;
      if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
      if (/[0-9]/.test(password)) strength++;
      if (/[^a-zA-Z0-9]/.test(password)) strength++;
      return Math.min(strength, 3);
    }

    function updateStrengthUI(strength) {
      const bars = passwordStrength.querySelectorAll('.strength-bar');
      bars.forEach((bar, index) => {
        bar.className = 'strength-bar';
        if (index < strength) {
          bar.classList.add(['weak', 'fair', 'good'][strength - 1]);
        }
      });
    }

    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      if (!supabaseClient) {
        showError('Service not initialized. Please refresh the page.');
        return;
      }

      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      if (password !== confirmPassword) {
        showError('Passwords do not match.');
        return;
      }

      if (password.length < 8) {
        showError('Password must be at least 8 characters long.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.parentElement.classList.add('loading');
      clearMessages();

      try {
        const { error } = await supabaseClient.auth.updateUser({ password });

        if (error) {
          showError(error.message || 'Failed to reset password.');
          submitBtn.disabled = false;
          submitBtn.parentElement.classList.remove('loading');
          return;
        }

        showSuccess('Password reset successfully! Redirecting to login...');
        setTimeout(() => {
          window.location.href = './login.html';
        }, 2000);
      } catch (error) {
        showError('An unexpected error occurred: ' + error.message);
        submitBtn.disabled = false;
        submitBtn.parentElement.classList.remove('loading');
      }
    });

    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.classList.add('show');
    }

    function showSuccess(message) {
      successMessage.textContent = message;
      successMessage.classList.add('show');
    }

    function clearMessages() {
      errorMessage.classList.remove('show');
      successMessage.classList.remove('show');
    }
  </script>
</body>
</html>
