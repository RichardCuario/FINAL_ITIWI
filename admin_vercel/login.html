<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - ITIWI</title>
  <link rel="stylesheet" href="admin-theme.css">
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(99, 102, 241, 0.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(37, 99, 235, 0.14), transparent 30%),
        linear-gradient(180deg, #f8fbff 0%, #eef3ff 48%, #f7f9fc 100%);
      position: relative;
      overflow: hidden;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 80% 22%, rgba(37, 99, 235, 0.08) 0, rgba(37, 99, 235, 0.08) 28px, transparent 29px),
        radial-gradient(circle at 86% 33%, rgba(99, 102, 241, 0.07) 0, rgba(99, 102, 241, 0.07) 17px, transparent 18px),
        radial-gradient(circle at 90% 27%, rgba(148, 163, 184, 0.08) 0, rgba(148, 163, 184, 0.08) 9px, transparent 10px);
      z-index: 0;
    }

    .login-shell {
      position: relative;
      z-index: 1;
      width: min(100%, 1180px);
      min-height: 680px;
      display: grid;
      grid-template-columns: minmax(0, 0.94fr) minmax(420px, 1.06fr);
      align-items: center;
      gap: 32px;
      padding: 28px 12px;
    }

    .login-copy {
      padding: 28px 24px 28px 12px;
    }

    .brand-row {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 54px;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #60a5fa, #4f46e5);
      color: #fff;
      font-weight: 800;
      font-size: 16px;
      box-shadow: 0 16px 30px rgba(79, 70, 229, 0.22);
    }

    .brand-text strong {
      display: block;
      color: #1d4ed8;
      font-size: 30px;
      line-height: 1;
      letter-spacing: 0.06em;
    }

    .brand-text span {
      display: block;
      margin-top: 4px;
      color: var(--text-muted);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .hero-kicker {
      margin-bottom: 18px;
    }

    .login-copy h1 {
      margin: 0;
      font-size: clamp(40px, 5vw, 60px);
      line-height: 1.04;
      letter-spacing: -0.05em;
      color: #020617;
    }

    .subtitle {
      margin: 14px 0 0;
      color: #64748b;
      font-size: 24px;
      line-height: 1.4;
      font-weight: 600;
    }

    .login-form-wrap {
      display: grid;
      gap: 28px;
      margin-top: 58px;
      max-width: 430px;
    }

    .status-box {
      padding: 15px 18px;
      border-radius: 18px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      background: rgba(255, 255, 255, 0.74);
      color: var(--text-soft);
      font-size: 14px;
      line-height: 1.6;
      box-shadow: var(--shadow-sm);
    }

    .status-box.error {
      color: #b91c1c;
      background: rgba(254, 242, 242, 0.96);
      border-color: rgba(239, 68, 68, 0.16);
    }

    .status-box.success {
      color: #047857;
      background: rgba(236, 253, 245, 0.96);
      border-color: rgba(16, 185, 129, 0.18);
    }

    .field-stack {
      display: grid;
      gap: 18px;
    }

    .field-card {
      display: grid;
      grid-template-columns: 52px minmax(0, 1fr);
      align-items: center;
      min-height: 74px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.78);
      border: 1.5px solid rgba(15, 23, 42, 0.16);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
      overflow: hidden;
    }

    .field-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #475569;
      font-size: 20px;
    }

    .field-label {
      display: block;
      height: 100%;
    }

    .field-label input {
      height: 100%;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      padding: 0 20px 0 0;
      color: var(--text);
      font-size: 18px;
      font-weight: 600;
    }

    .field-label input::placeholder {
      color: rgba(51, 65, 85, 0.86);
    }

    .field-label input:focus {
      box-shadow: none;
    }

    .form-actions {
      padding-top: 6px;
    }

    .form-actions .btn {
      min-width: 168px;
      min-height: 52px;
      border-radius: 999px;
      padding: 14px 28px;
      font-size: 22px;
      font-weight: 700;
      box-shadow: 0 18px 28px rgba(29, 78, 216, 0.22);
    }

    .help-text {
      margin: 4px 0 0;
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.7;
      max-width: 430px;
    }

    .visual-panel {
      position: relative;
      min-height: 640px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .visual-stage {
      position: relative;
      width: 100%;
      max-width: 700px;
      aspect-ratio: 1.05 / 0.9;
    }

    .shape-main {
      position: absolute;
      inset: 12% 10% 2% 8%;
      border-radius: 45% 38% 24% 30% / 34% 32% 30% 28%;
      background: radial-gradient(circle at 38% 35%, rgba(255, 255, 255, 0.55), rgba(191, 219, 254, 0.4) 38%, rgba(147, 197, 253, 0.25) 60%, rgba(191, 219, 254, 0.14) 100%);
    }

    .shape-secondary {
      position: absolute;
      right: 12%;
      bottom: 4%;
      width: 220px;
      height: 170px;
      border-radius: 45% 55% 52% 48%;
      background: rgba(147, 197, 253, 0.22);
    }

    .bubble {
      position: absolute;
      border-radius: 999px;
      background: rgba(191, 219, 254, 0.48);
    }

    .bubble.b1 {
      right: 22%;
      top: 4%;
      width: 54px;
      height: 54px;
    }

    .bubble.b2 {
      right: 8%;
      top: 18%;
      width: 34px;
      height: 34px;
    }

    .bubble.b3 {
      right: 1%;
      top: 16%;
      width: 18px;
      height: 18px;
    }

    .orbit {
      position: absolute;
      inset: 24% 17% 15% 20%;
      border-radius: 50%;
      border: 3px dashed rgba(255, 255, 255, 0.55);
      opacity: 0.58;
    }

    .floating-card,
    .shield-card,
    .lock-card,
    .code-card {
      position: absolute;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 18px;
      box-shadow: var(--shadow-sm);
    }

    .floating-card {
      top: 19%;
      left: 41%;
      width: 68px;
      height: 48px;
      background: #93c5fd;
      color: white;
      font-weight: 800;
      letter-spacing: 0.22em;
      font-size: 12px;
    }

    .shield-card {
      top: 18%;
      right: 29%;
      width: 76px;
      height: 86px;
      background: linear-gradient(180deg, #bfdbfe, #93c5fd);
      clip-path: polygon(50% 0%, 100% 20%, 88% 68%, 50% 100%, 12% 68%, 0% 20%);
      color: #2563eb;
      font-size: 30px;
      font-weight: 700;
    }

    .lock-card {
      right: 14%;
      top: 28%;
      width: 56px;
      height: 78px;
      border-radius: 18px;
      background: rgba(191, 219, 254, 0.9);
      color: #ffffff;
      font-size: 32px;
    }

    .code-card {
      right: 8%;
      width: 84px;
      height: 38px;
      border-radius: 12px;
      background: rgba(147, 197, 253, 0.85);
      color: #2563eb;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .code-card.css {
      top: 48%;
    }

    .code-card.html {
      top: 58%;
      right: 4%;
    }

    .scene-base {
      position: absolute;
      left: 14%;
      right: 10%;
      bottom: 4%;
      height: 30px;
      border-radius: 50%;
      background: rgba(100, 116, 139, 0.18);
      filter: blur(1px);
    }

    .plant {
      position: absolute;
      width: 120px;
      height: 120px;
    }

    .plant.left {
      left: 6%;
      bottom: 17%;
    }

    .plant.right {
      right: 0;
      bottom: 8%;
    }

    .leaf {
      position: absolute;
      width: 58px;
      height: 24px;
      background: linear-gradient(135deg, #0891b2, #0f766e);
      border-radius: 100% 0 100% 0;
      transform-origin: left center;
      opacity: 0.96;
    }

    .plant.left .leaf:nth-child(1) {
      left: 24px;
      top: 12px;
      transform: rotate(-38deg);
    }

    .plant.left .leaf:nth-child(2) {
      left: 10px;
      top: 42px;
      transform: rotate(-8deg);
    }

    .plant.left .leaf:nth-child(3) {
      left: 32px;
      top: 64px;
      transform: rotate(22deg);
    }

    .plant.right .leaf:nth-child(1) {
      right: 30px;
      top: 20px;
      transform: rotate(28deg);
    }

    .plant.right .leaf:nth-child(2) {
      right: 8px;
      top: 48px;
      transform: rotate(-8deg);
    }

    .plant.right .leaf:nth-child(3) {
      right: 34px;
      top: 78px;
      transform: rotate(-34deg);
    }

    .monitor {
      position: absolute;
      left: 20%;
      bottom: 8%;
      width: 46%;
      height: 38%;
      border-radius: 22px;
      background: linear-gradient(145deg, #93b9e6, #a8c6ec 42%, #8ab0de);
      border: 10px solid rgba(255, 255, 255, 0.34);
      box-shadow: inset 0 0 0 1px rgba(59, 130, 246, 0.16);
      overflow: hidden;
    }

    .monitor::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        -35deg,
        rgba(255, 255, 255, 0.08) 0,
        rgba(255, 255, 255, 0.08) 14px,
        rgba(255, 255, 255, 0.02) 14px,
        rgba(255, 255, 255, 0.02) 28px
      );
      opacity: 0.8;
    }

    .monitor::after {
      content: "";
      position: absolute;
      left: 22%;
      top: 14%;
      width: 34%;
      height: 34%;
      background: rgba(255, 255, 255, 0.34);
      border-radius: 50%;
    }

    .monitor-stand {
      position: absolute;
      left: 30%;
      bottom: 6%;
      width: 12%;
      height: 26%;
      border-left: 7px solid rgba(255, 255, 255, 0.72);
      border-bottom: 7px solid rgba(255, 255, 255, 0.72);
      border-radius: 0 0 0 22px;
      transform: skew(-8deg);
    }

    .monitor-stand::before,
    .monitor-stand::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.82);
      left: -13px;
    }

    .monitor-stand::before {
      top: 10px;
    }

    .monitor-stand::after {
      bottom: -9px;
    }

    .seated {
      position: absolute;
      left: 38%;
      top: 24%;
      width: 34%;
      height: 47%;
    }

    .seated .head {
      position: absolute;
      left: 30%;
      top: 0;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: #7c3f1b;
      z-index: 3;
    }

    .seated .hair {
      position: absolute;
      left: 24%;
      top: -4px;
      width: 74px;
      height: 48px;
      border-radius: 50% 50% 42% 38%;
      background: #3b1d0f;
      z-index: 4;
    }

    .seated .torso {
      position: absolute;
      left: 22%;
      top: 48px;
      width: 116px;
      height: 92px;
      border-radius: 26px 26px 18px 20px;
      background: #f59e0b;
      transform: skewX(-8deg);
      z-index: 2;
    }

    .seated .arm-left,
    .seated .arm-right {
      position: absolute;
      height: 20px;
      border-radius: 999px;
      background: #d68b57;
      z-index: 4;
      transform-origin: left center;
    }

    .seated .arm-left {
      left: 4%;
      top: 96px;
      width: 90px;
      transform: rotate(42deg);
    }

    .seated .arm-right {
      left: 60%;
      top: 90px;
      width: 72px;
      transform: rotate(-18deg);
    }

    .seated .skirt {
      position: absolute;
      left: 24%;
      top: 118px;
      width: 148px;
      height: 92px;
      border-radius: 24px 24px 40px 36px;
      background: #3b82f6;
      z-index: 1;
    }

    .seated .leg-left,
    .seated .leg-right {
      position: absolute;
      width: 26px;
      background: #2563eb;
      border-radius: 16px;
      z-index: 0;
    }

    .seated .leg-left {
      left: 40%;
      top: 180px;
      height: 92px;
      transform: rotate(-2deg);
    }

    .seated .leg-right {
      left: 68%;
      top: 176px;
      height: 86px;
      transform: rotate(-14deg);
    }

    .seated .shoe-left,
    .seated .shoe-right {
      position: absolute;
      width: 34px;
      height: 12px;
      border-radius: 999px;
      background: #2563eb;
    }

    .seated .shoe-left {
      left: 38%;
      top: 266px;
    }

    .seated .shoe-right {
      left: 76%;
      top: 246px;
      transform: rotate(20deg);
    }

    .worker {
      position: absolute;
      right: 14%;
      bottom: 1%;
      width: 31%;
      height: 43%;
    }

    .worker .head {
      position: absolute;
      left: 42%;
      top: 10%;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: #d99062;
      z-index: 4;
    }

    .worker .hair {
      position: absolute;
      left: 39%;
      top: 4%;
      width: 54px;
      height: 34px;
      border-radius: 46% 46% 34% 34%;
      background: #2a130b;
      z-index: 5;
    }

    .worker .torso {
      position: absolute;
      left: 22%;
      top: 25%;
      width: 124px;
      height: 78px;
      border-radius: 22px;
      background: #3b82f6;
      z-index: 2;
    }

    .worker .laptop {
      position: absolute;
      left: 12%;
      top: 40%;
      width: 128px;
      height: 62px;
      background: #93b5e1;
      border-radius: 8px;
      transform: skew(-8deg);
      z-index: 6;
      box-shadow: 0 12px 18px rgba(59, 130, 246, 0.12);
    }

    .worker .laptop::after {
      content: "";
      position: absolute;
      left: -8px;
      right: -10px;
      bottom: -10px;
      height: 14px;
      background: #7ea5d8;
      border-radius: 10px;
      transform: skew(8deg);
    }

    .worker .arm {
      position: absolute;
      width: 74px;
      height: 20px;
      border-radius: 999px;
      background: #f08f7b;
      z-index: 5;
    }

    .worker .arm.left {
      left: 8%;
      top: 46%;
      transform: rotate(-26deg);
    }

    .worker .arm.right {
      left: 68%;
      top: 42%;
      transform: rotate(64deg);
      width: 68px;
    }

    .worker .leg-left,
    .worker .leg-right {
      position: absolute;
      background: #f59e0b;
      border-radius: 18px;
      z-index: 1;
    }

    .worker .leg-left {
      left: 30%;
      top: 62%;
      width: 52px;
      height: 130px;
      transform: rotate(8deg);
    }

    .worker .leg-right {
      left: 54%;
      top: 60%;
      width: 48px;
      height: 126px;
      transform: rotate(-8deg);
    }

    .worker .shoe-left,
    .worker .shoe-right {
      position: absolute;
      width: 34px;
      height: 18px;
      border-radius: 12px;
      background: #2a130b;
      bottom: 0;
      z-index: 2;
    }

    .worker .shoe-left {
      left: 34%;
    }

    .worker .shoe-right {
      left: 62%;
    }

    @media (max-width: 1100px) {
      .login-shell {
        grid-template-columns: 1fr;
        min-height: auto;
        gap: 8px;
      }

      .login-copy {
        padding: 16px 10px 0;
      }

      .visual-panel {
        min-height: 460px;
      }

      .brand-row {
        margin-bottom: 32px;
      }

      .login-form-wrap {
        margin-top: 36px;
      }
    }

    @media (max-width: 760px) {
      body {
        padding: 18px;
      }

      .login-shell {
        padding: 6px 0 16px;
      }

      .brand-text strong {
        font-size: 24px;
      }

      .login-copy h1 {
        font-size: 38px;
      }

      .subtitle {
        font-size: 18px;
      }

      .field-card {
        min-height: 64px;
      }

      .field-label input {
        font-size: 16px;
      }

      .form-actions .btn {
        width: 100%;
        min-width: 0;
        font-size: 20px;
      }

      .visual-panel {
        min-height: 320px;
      }

      .floating-card,
      .shield-card,
      .lock-card,
      .code-card,
      .plant {
        transform: scale(0.86);
      }
    }
  </style>
</head>
<body>
  <div class="login-shell">
    <section class="login-copy">
      <div class="brand-row">
        <span class="brand-mark">IT</span>
        <div class="brand-text">
          <strong>ITIWI</strong>
          <span>Disaster Information</span>
        </div>
      </div>

      <span class="hero-kicker">Admin Access</span>
      <h1>Welcome back, Admin</h1>
      <p class="subtitle">Welcome back to your special place</p>

      <form id="loginForm" class="login-form-wrap">
        <div id="statusBox" class="status-box">Enter your admin credentials to continue.</div>

        <div class="field-stack">
          <div class="field-card">
            <span class="field-icon">&#128100;</span>
            <label class="field-label" for="email">
              <input id="email" name="email" type="email" placeholder="Username" autocomplete="email" required>
            </label>
          </div>

          <div class="field-card">
            <span class="field-icon">&#128274;</span>
            <label class="field-label" for="password">
              <input id="password" name="password" type="password" placeholder="Password" autocomplete="current-password" required>
            </label>
          </div>
        </div>

        <div class="form-actions">
          <button class="btn btn-primary" type="submit" id="loginButton">Login</button>
        </div>

      </form>
    </section>

    <section class="visual-panel" aria-hidden="true">
      <div class="visual-stage">
        <div class="shape-main"></div>
        <div class="shape-secondary"></div>
        <div class="bubble b1"></div>
        <div class="bubble b2"></div>
        <div class="bubble b3"></div>
        <div class="orbit"></div>
        <div class="floating-card">&bull; &bull; &bull;</div>
        <div class="shield-card">&#10003;</div>
        <div class="lock-card">&#128274;</div>
        <div class="code-card css">CSS</div>
        <div class="code-card html">HTML</div>
        <div class="scene-base"></div>

        <div class="plant left">
          <span class="leaf"></span>
          <span class="leaf"></span>
          <span class="leaf"></span>
        </div>

        <div class="plant right">
          <span class="leaf"></span>
          <span class="leaf"></span>
          <span class="leaf"></span>
        </div>

        <div class="monitor"></div>
        <div class="monitor-stand"></div>

        <div class="seated">
          <span class="hair"></span>
          <span class="head"></span>
          <span class="torso"></span>
          <span class="arm-left"></span>
          <span class="arm-right"></span>
          <span class="skirt"></span>
          <span class="leg-left"></span>
          <span class="leg-right"></span>
          <span class="shoe-left"></span>
          <span class="shoe-right"></span>
        </div>

        <div class="worker">
          <span class="hair"></span>
          <span class="head"></span>
          <span class="torso"></span>
          <span class="arm left"></span>
          <span class="arm right"></span>
          <span class="laptop"></span>
          <span class="leg-left"></span>
          <span class="leg-right"></span>
          <span class="shoe-left"></span>
          <span class="shoe-right"></span>
        </div>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script>
    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const statusBox = document.getElementById('statusBox');
    const loginButton = document.getElementById('loginButton');

    function setStatus(message, type = '') {
      statusBox.textContent = message;
      statusBox.className = `status-box${type ? ` ${type}` : ''}`;
    }

    async function initializeLoginPage() {
      try {
        await window.adminAuth.redirectIfAuthenticated();
        setStatus('Enter your admin credentials to continue.');
      } catch (error) {
        setStatus(error.message || 'Unable to initialize login.', 'error');
      }
    }

    loginForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email) {
        setStatus('Please enter your email address.', 'error');
        emailInput.focus();
        return;
      }

      if (!password) {
        setStatus('Please enter your password.', 'error');
        passwordInput.focus();
        return;
      }

      loginButton.disabled = true;
      setStatus('Signing in...');

      try {
        const { error } = await window.adminAuth.signInAdmin(email, password);

        if (error) {
          throw error;
        }

        setStatus('Sign in successful. Redirecting to dashboard...', 'success');
        window.setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 700);
      } catch (error) {
        setStatus(error.message || 'Unable to sign in.', 'error');
        loginButton.disabled = false;
      }
    });

    initializeLoginPage();
  </script>
</body>
</html>
